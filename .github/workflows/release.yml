# Builds the .deb and attaches it to a GitHub Release whenever a
# version tag is pushed:  git tag v0.1.0 && git push --tags
#
# Built on ubuntu-22.04 (oldest supported runner) so the binary links
# against an older glibc/webkit and runs on more Debian-family releases.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev build-essential \
            curl wget file libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .deb
        run: npm run tauri build

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/deb/*.deb
          generate_release_notes: true
